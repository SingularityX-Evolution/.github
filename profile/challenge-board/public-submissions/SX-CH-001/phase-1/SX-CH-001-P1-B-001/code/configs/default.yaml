# SX-CH-001 默认配置

aggregator:
  # 默认聚合器: NaiveMultiplier | LogOdds | BayesianUpdater | NoisyOR | DampedMultiplier
  default: NoisyOR

stopping:
  # 组合停止准则（OR 逻辑：任一准则触发即停止）
  mode: OR
  criteria:
    - type: MaxHop
      max_hops: 5
      min_hops: 1
    - type: FloorConfidence
      floor: 0.05
      min_hops: 2
    - type: CIWidth
      width_threshold: 0.15
      min_hops: 2
    - type: InfoGain
      info_gain_threshold: 0.01
      min_hops: 2

calibration:
  n_bins: 10
  n_samples: 10000
  min_calibration_samples: 50

validation:
  target_brier_score: 0.15  # S 档标准
  target_ece: 0.10
  min_samples_per_hop: 5

output:
  format: csv
  include_intermediate: true
  save_plots: true
