# SX-CH-001 Default Configuration
# Rule version V1.0.0

# --- Chain defaults ---
chain:
  max_hops: 10
  default_hop_confidence: 0.7
  default_interrupt_prob: 0.05

# --- Aggregators ---
aggregators:
  # Naive product (baseline)
  naive_product:
    enabled: true

  # Logit aggregation
  logit:
    enabled: true
    prior_weight: 1.5        # Stronger prior anchoring
    correlation_penalty: 0.15  # Penalty for inter-hop correlation

  # Bayesian sequential update
  bayesian:
    enabled: true
    prior_belief: 0.40        # Initial prior P(C)
    likelihood_strength: 0.70  # Dampen likelihood ratios

  # Noisy-OR / multi-path
  noisy_or:
    enabled: true
    independence_threshold: 0.3  # Below this correlation, treat paths as independent

  # Geometric mean
  geometric_mean:
    enabled: true

# --- Interrupt model ---
interrupt:
  # Per-hop-type base interrupt probabilities
  type_priors:
    geopolitical: 0.18
    macroeconomic: 0.12
    sector: 0.08
    company: 0.05
    technical: 0.04
    sentiment: 0.08
    unknown: 0.10
  # Time-span multiplier (per day, capped)
  time_factor_per_day: 0.003
  time_factor_cap: 1.0

# --- Stopping criteria ---
stopping:
  confidence_floor: 0.10       # Stop when aggregate confidence < this
  ci_width_threshold: 0.40     # Stop when 90% CI width > this
  min_information_gain: 0.01   # Stop when expected IG < this
  max_hops: 8                  # Hard safety limit

# --- Calibration ---
calibration:
  num_bins: 10                 # Bins for reliability diagram
  confidence_interval: 0.90    # CI level
  min_samples_per_bin: 5       # Minimum samples for a valid bin

# --- Evaluation ---
evaluation:
  min_chains: 50               # Minimum chains for valid evaluation
  random_seed: 42
  test_ratio: 0.3              # Fraction held out for calibration evaluation
  n_chains: 200                # Number of synthetic chains to generate
