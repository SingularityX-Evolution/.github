name: Notify Feishu on GitHub Issues

on:
  issues:
    types: [opened]

  issue_comment:
    types: [created]

  workflow_dispatch:

jobs:
  notify-feishu:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'issues' || (github.event_name == 'issue_comment' && !github.event.issue.pull_request) }}
    runs-on: ubuntu-latest

    steps:
      - name: Send notification to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          webhook = os.environ.get("FEISHU_WEBHOOK", "").strip()
          if not webhook:
              print("FEISHU_WEBHOOK is empty. 请检查 GitHub Secrets 里是否有 FEISHU_WEBHOOK。")
              sys.exit(1)

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")

          if event_name == "workflow_dispatch":
              text = "\n".join([
                  "GitHub 飞书机器人测试消息",
                  "",
                  f"仓库：{repo}",
                  "",
                  "如果飞书群能看到这条消息，说明 FEISHU_WEBHOOK 和机器人 webhook 正常。"
              ])

          else:
              with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as f:
                  event = json.load(f)

              issue = event.get("issue", {})
              issue_number = issue.get("number", "")
              issue_title = issue.get("title", "")
              issue_url = issue.get("html_url", "")

              if event_name == "issues":
                  issue_user = issue.get("user", {}).get("login", "")
                  issue_body = (issue.get("body") or "")[:3500]

                  text = "\n".join([
                      "GitHub 新 Issue",
                      "",
                      f"仓库：{repo}",
                      f"Issue：#{issue_number} {issue_title}",
                      f"创建人：@{issue_user}",
                      f"链接：{issue_url}",
                      "",
                      "Issue 内容：",
                      issue_body
                  ])

              elif event_name == "issue_comment":
                  comment = event.get("comment", {})
                  comment_user = comment.get("user", {}).get("login", "")
                  comment_url = comment.get("html_url", "")
                  comment_body = (comment.get("body") or "")[:3500]

                  text = "\n".join([
                      "GitHub Issue 新评论",
                      "",
                      f"仓库：{repo}",
                      f"Issue：#{issue_number} {issue_title}",
                      f"评论人：@{comment_user}",
                      f"Issue 链接：{issue_url}",
                      f"评论链接：{comment_url}",
                      "",
                      "评论内容：",
                      comment_body
                  ])

              else:
                  print(f"Unsupported event: {event_name}")
                  sys.exit(0)

          payload = {
              "msg_type": "text",
              "content": {
                  "text": text
              }
          }

          data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
          req = urllib.request.Request(
              webhook,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  resp_body = resp.read().decode("utf-8", errors="replace")
          except urllib.error.HTTPError as e:
              resp_body = e.read().decode("utf-8", errors="replace")
              print(resp_body)
              sys.exit(1)

          print("Feishu response:")
          print(resp_body)

          try:
              result = json.loads(resp_body)
              code = result.get("code", result.get("StatusCode", 0))
              if code != 0:
                  sys.exit(1)
          except json.JSONDecodeError:
              pass
          PY
